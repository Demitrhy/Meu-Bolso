<title>MeuBolso</title>
<style>
  :root{
    --bg:#F2F2F7; --card:#FFFFFF; --card2:#FFFFFF; --text:#1C1C1E; --text2:#8A8A8E;
    --sep:rgba(60,60,67,.14); --bar:rgba(249,249,249,.82);
    --blue:#007AFF; --green:#34C759; --red:#FF3B30; --orange:#FF9500; --purple:#AF52DE; --yellow:#C79100;
    --fill:rgba(120,120,128,.12);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#000000; --card:#1C1C1E; --card2:#2C2C2E; --text:#FFFFFF; --text2:#98989E;
      --sep:rgba(84,84,88,.5); --bar:rgba(22,22,24,.8); --fill:rgba(120,120,128,.24); --yellow:#FFD60A;
    }
  }
  :root[data-theme="dark"]{
    --bg:#000000; --card:#1C1C1E; --card2:#2C2C2E; --text:#FFFFFF; --text2:#98989E;
    --sep:rgba(84,84,88,.5); --bar:rgba(22,22,24,.8); --fill:rgba(120,120,128,.24); --yellow:#FFD60A;
  }
  :root[data-theme="light"]{
    --bg:#F2F2F7; --card:#FFFFFF; --card2:#FFFFFF; --text:#1C1C1E; --text2:#8A8A8E;
    --sep:rgba(60,60,67,.14); --bar:rgba(249,249,249,.82); --fill:rgba(120,120,128,.12); --yellow:#C79100;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--text); overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  input,select{font-family:inherit;}

  /* esconde as barras de rolagem (fica limpo como no iPhone) */
  *{scrollbar-width:none; -ms-overflow-style:none;}
  ::-webkit-scrollbar{width:0; height:0; display:none;}

  /* formato iPhone: coluna estreita centralizada; moldura só em tela larga */
  #app{height:100dvh; display:flex; flex-direction:column; max-width:440px; margin:0 auto; position:relative; background:var(--bg); overflow:hidden;}
  @media (min-width:500px){
    body{background:#000; display:flex; align-items:center; justify-content:center;}
    #app{height:min(880px,94dvh); border-radius:46px; box-shadow:0 24px 70px rgba(0,0,0,.6); border:11px solid #0a0a0a; outline:1px solid #222;}
    #backdrop,#sheet{position:absolute;}
  }

  /* ---------- Header ---------- */
  #topbar{ padding:14px 20px 8px; position:relative; flex:0 0 auto; }
  .lt-row{display:flex; align-items:flex-end; justify-content:space-between; gap:8px;}
  .lt-row h1{font-size:32px; font-weight:800; letter-spacing:-.5px; margin:0; line-height:1.1;}
  .hbtn{ font-size:16px; color:var(--blue); font-weight:600; padding:6px 4px; display:flex; align-items:center; gap:4px; }
  .hbtn.plus{ width:34px; height:34px; border-radius:50%; background:var(--fill); font-size:22px; font-weight:400; justify-content:center; padding:0; color:var(--blue); }

  /* ---------- Screen ---------- */
  #screen{ flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:6px 16px 24px; }

  .hero{ background:linear-gradient(135deg,#0A84FF,#0060DF); color:#fff; border-radius:22px; padding:20px 22px; margin:10px 0 16px; box-shadow:0 10px 24px rgba(10,132,255,.28); }
  .hero.neg{background:linear-gradient(135deg,#FF453A,#D70015); box-shadow:0 10px 24px rgba(255,69,58,.28);}
  .hero-label{font-size:13px; opacity:.9; font-weight:600;}
  .hero-value{font-size:40px; font-weight:800; letter-spacing:-1px; margin:2px 0 8px;}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;}
  .grid2 > *{min-width:0;}
  .green{color:var(--green);} .red{color:var(--red);} .orange{color:var(--orange);} .yellow{color:var(--yellow);}

  .sec-title{font-size:15px; font-weight:800; margin:20px 4px 8px; display:flex; justify-content:space-between; align-items:center;}
  .sec-title a{font-size:14px; color:var(--blue); font-weight:600;}

  .empty{text-align:center; color:var(--text2); padding:40px 20px; font-size:15px;}
  .empty .em{font-size:40px; display:block; margin-bottom:10px;}

  .seg{display:flex; background:var(--fill); border-radius:9px; padding:2px; margin:4px 0 14px;}
  .seg button{flex:1; font-size:13px; font-weight:600; padding:7px 4px; border-radius:7px; color:var(--text);}
  .seg button.on{background:var(--card); box-shadow:0 1px 3px rgba(0,0,0,.12);}

  .goal-name{font-size:17px; font-weight:800;}
  .goal-target{font-size:13px; color:var(--text2); font-weight:600; margin-top:2px;}
  .goal-btn{margin-top:12px; width:100%; background:var(--fill); color:var(--blue); font-weight:700; padding:10px; border-radius:11px; font-size:15px;}

  .footer{text-align:center; margin:28px 0 8px;}
  .footer button{color:var(--red); font-size:14px; font-weight:600;}
  .ver{text-align:center; color:var(--text2); font-size:11px; margin-top:10px; line-height:1.5;}

  .datacard{margin:8px 0 6px; background:var(--card); border-radius:16px; overflow:hidden;}
  .datacard button{width:100%; padding:15px 16px; text-align:left; font-size:16px; font-weight:600; display:flex; align-items:center; gap:11px; background:var(--card); color:var(--text);}
  .datacard button:active{background:var(--fill);}
  .datacard button + button{border-top:.5px solid var(--sep);}
  .datacard button.danger{color:var(--red);}

  /* ---------- Month pills ---------- */
  .mstrip{display:flex; gap:7px; padding:14px 0 4px;}
  .mpill{flex:1 1 0; min-width:0; text-align:center; padding:9px 6px; border-radius:20px; font-size:14px; font-weight:700; color:var(--text2); background:transparent; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:background .2s, color .2s;}
  .mpill.on{background:var(--blue); color:#fff;}

  /* ---------- Nubank-style rows & sections ---------- */
  .ncard{background:var(--card); border-radius:16px; padding:0 14px; overflow:hidden;}
  .nrow{display:flex; align-items:center; gap:14px; padding:13px 2px; transition:opacity .15s;}
  .nrow:active{opacity:.55;}
  .nrow + .nrow{border-top:.5px solid var(--sep);}
  .nic{width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; flex:0 0 auto; border:none; transition:transform .15s;}
  .nic:active{transform:scale(.88);}
  .nrow-mid{flex:1 1 auto; min-width:0;}
  .nrow-name{font-size:16.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .nrow-sub{font-size:13px; color:var(--text2); margin-top:3px; text-transform:none;}
  .nrow-sub.late{color:var(--red); font-weight:600;}
  .nrow-val{font-size:16px; font-weight:700; flex:0 0 auto; white-space:nowrap;}
  .nrow-val.paid{color:var(--text2); font-weight:600;}

  .nsec{margin:6px 0 2px;}
  .nsec-head{display:flex; align-items:center; justify-content:space-between; padding:12px 2px 8px;}
  .nsec-title{font-size:18px; font-weight:800; letter-spacing:-.3px;}
  .nsec-sub{font-size:13px; color:var(--text2); margin-top:2px;}
  .chev{font-size:22px; color:var(--text2); transition:transform .3s cubic-bezier(.2,.8,.2,1); display:inline-block; line-height:1; padding:6px;}
  .chev.closed{transform:rotate(-90deg);}
  .collapse{display:grid; grid-template-rows:1fr; transition:grid-template-rows .32s cubic-bezier(.2,.8,.2,1);}
  .collapse.closed{grid-template-rows:0fr;}
  .collapse > .cwrap{overflow:hidden; min-height:0;}

  @keyframes fadein{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}

  /* ---------- Rich cards / hero / charts ---------- */
  .card{background:var(--card); border-radius:18px; padding:16px 18px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.05);}

  .hero{position:relative; overflow:hidden;}
  .hero::after{content:""; position:absolute; top:-50px; right:-40px; width:170px; height:170px; border-radius:50%; background:rgba(255,255,255,.13);}
  .hero::before{content:""; position:absolute; bottom:-70px; right:40px; width:130px; height:130px; border-radius:50%; background:rgba(255,255,255,.09);}
  .hero > div{position:relative; z-index:1;}
  .hero-top{display:flex; justify-content:space-between; align-items:center;}
  .hero-badge{background:rgba(255,255,255,.22); padding:5px 13px; border-radius:20px; font-size:12px; font-weight:800; text-transform:capitalize;}
  .hero-prog{height:6px; border-radius:4px; background:rgba(255,255,255,.28); overflow:hidden; margin:4px 0 14px;}
  .hero-prog > i{display:block; height:100%; background:#fff; border-radius:4px; transition:width .55s cubic-bezier(.2,.8,.2,1);}
  .hero-row3{display:flex; gap:6px; border-top:1px solid rgba(255,255,255,.24); padding-top:13px; margin-top:4px;}
  .hero-row3 > div{flex:1;}
  .hero-row3 small{display:block; font-size:11px; opacity:.85; font-weight:700; margin-bottom:3px;}
  .hero-row3 b{font-size:15.5px; font-weight:800;}

  .stat{display:flex; flex-direction:column; align-items:flex-start; gap:10px;}
  .stat .s-ic{width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:18px; flex:0 0 auto;}
  .stat .s-tx{min-width:0; width:100%;}
  .stat .s-lab2{font-size:12px; color:var(--text2); font-weight:600;}
  .stat .s-val2{font-size:20px; font-weight:800; letter-spacing:-.4px; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

  .bd-head{font-size:15px; font-weight:800; display:flex; justify-content:space-between; align-items:center;}
  .bd-head span.mut{color:var(--text2); font-size:13px; font-weight:600; text-transform:capitalize;}
  .bd-bar{display:flex; gap:2px; height:16px; border-radius:8px; overflow:hidden; margin:15px 0 16px; background:var(--fill);}
  .bd-bar > i{display:block; height:100%; border-radius:3px; min-width:3px; transition:width .5s cubic-bezier(.2,.8,.2,1);}
  .bd-legend{display:flex; flex-direction:column; gap:12px;}
  .bd-row{display:flex; align-items:center; gap:10px; font-size:14.5px;}
  .bd-dot{width:11px; height:11px; border-radius:4px; flex:0 0 auto;}
  .bd-name{flex:1; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .bd-val{font-weight:700; font-variant-numeric:tabular-nums;}
  .bd-pct{color:var(--text2); font-size:12.5px; min-width:36px; text-align:right; font-variant-numeric:tabular-nums;}

  .goal-top2{display:flex; gap:16px; align-items:center;}
  .ring{flex:0 0 auto;}
  .goal-info2{flex:1; min-width:0;}
  .goal-eta2{font-size:13.5px; margin-top:12px; padding-top:12px; border-top:.5px solid var(--sep);}
  .goal-eta2 b{color:var(--text);}

  /* alertas de vencimento */
  .alist{display:flex; flex-direction:column; gap:12px; margin:14px 0 16px;}
  .arow{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .amid{min-width:0;}
  .aname{font-size:15.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .astatus{font-size:12.5px; font-weight:700; margin-top:2px;}
  .aval{font-size:15.5px; font-weight:700; flex:0 0 auto;}
  .cal-btn{width:100%; background:var(--blue); color:#fff; font-weight:700; padding:13px; border-radius:12px; font-size:15px;}
  .cal-btn:active{opacity:.8;}

  /* ---------- Tab bar ---------- */
  #tabbar{ flex:0 0 auto; display:flex; padding-bottom:env(safe-area-inset-bottom); background:var(--bar); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); border-top:.5px solid var(--sep); }
  #tabbar button{flex:1; padding:10px 0 12px; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--text2); font-size:10.5px; font-weight:600;}
  #tabbar button .ti{font-size:23px; line-height:1;}
  #tabbar button.on{color:var(--blue);}

  /* ---------- Sheet ---------- */
  #backdrop{position:fixed; inset:0; background:rgba(0,0,0,.4); opacity:0; pointer-events:none; transition:opacity .25s; z-index:30;}
  #sheet{ position:fixed; left:0; right:0; bottom:0; z-index:40; background:var(--bg); border-radius:22px 22px 0 0; padding:8px 20px 24px; transform:translateY(110%); transition:transform .3s cubic-bezier(.2,.8,.2,1); max-height:92%; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  body.sheet-open #backdrop{opacity:1; pointer-events:auto;}
  body.sheet-open #sheet{transform:translateY(0);}
  .grab{width:38px; height:5px; border-radius:3px; background:var(--sep); margin:8px auto 6px;}
  .sheet-head{display:flex; justify-content:space-between; align-items:center; margin:6px 0 16px;}
  .sheet-head h2{font-size:20px; font-weight:800; margin:0;}
  .sheet-head button{font-size:16px; color:var(--blue); font-weight:600;}
  .field{margin-bottom:14px;}
  .field label{font-size:13px; font-weight:700; color:var(--text2); display:block; margin:0 2px 6px;}
  .field input, .field select{ width:100%; font-size:17px; padding:13px 14px; border-radius:13px; border:none; background:var(--card); color:var(--text); }
  .field input:focus,.field select:focus{outline:2px solid var(--blue);}
  .chips{display:flex; gap:8px; overflow-x:auto; padding:2px 0 4px; -webkit-overflow-scrolling:touch;}
  .chip{flex:0 0 auto; padding:8px 13px; border-radius:20px; background:var(--card); font-size:14px; font-weight:600; white-space:nowrap; border:1.5px solid transparent;}
  .chip.on{border-color:var(--blue); color:var(--blue); background:rgba(0,122,255,.1);}
  .pay-btn{width:100%; padding:15px; border-radius:14px; font-size:17px; font-weight:800; margin:2px 0 18px; display:flex; align-items:center; justify-content:center; gap:8px; background:var(--green); color:#fff;}
  .pay-btn.undo{background:var(--fill); color:var(--text);}
  .save-btn{width:100%; background:var(--blue); color:#fff; font-size:17px; font-weight:700; padding:15px; border-radius:14px; margin-top:8px;}
  .del-btn{width:100%; background:transparent; color:var(--red); font-size:16px; font-weight:600; padding:14px; margin-top:6px;}
  .toggle-row{display:flex; align-items:center; justify-content:space-between; background:var(--card); padding:13px 14px; border-radius:13px; font-size:16px; font-weight:600;}
  .toggle-row input{width:auto; transform:scale(1.3); accent-color:var(--green);}
  .hint{font-size:12.5px; color:var(--text2); margin:6px 2px 0; line-height:1.4;}
</style>

<div id="app">
  <header id="topbar"></header>
  <main id="screen"></main>
  <nav id="tabbar">
    <button data-tab="resumo"><span class="ti">◈</span>Resumo</button>
    <button data-tab="gastos"><span class="ti">≣</span>Gastos</button>
    <button data-tab="metas"><span class="ti">◎</span>Metas</button>
  </nav>
  <div id="backdrop"></div>
  <div id="sheet"></div>
</div>

<script>
"use strict";

/* ===================== DATA ===================== */
const KEY='meubolso_v1';
const VERSION='1.3.0'; // <-- incrementar a cada atualização pra conferir no rodapé
const CATS=[
  {id:'moradia',emoji:'🏠',name:'Moradia',color:'#FF9F40'},
  {id:'alimentacao',emoji:'🍽️',name:'Alimentação',color:'#FF6B6B'},
  {id:'transporte',emoji:'🚙',name:'Transporte',color:'#4D96FF'},
  {id:'contas',emoji:'💡',name:'Contas',color:'#FFC93D'},
  {id:'saude',emoji:'🏥',name:'Saúde',color:'#FF7AB6'},
  {id:'lazer',emoji:'🎮',name:'Lazer',color:'#A66CFF'},
  {id:'educacao',emoji:'📚',name:'Educação',color:'#22C1C3'},
  {id:'compras',emoji:'🛍️',name:'Compras',color:'#6BCB77'},
  {id:'assinaturas',emoji:'📺',name:'Assinaturas',color:'#845EF7'},
  {id:'cartao',emoji:'💳',name:'Cartão',color:'#3AC0E7'},
  {id:'outros',emoji:'📦',name:'Outros',color:'#9AA0A6'},
];
const catOf=id=>CATS.find(c=>c.id===id)||CATS[CATS.length-1];
function hexA(hex,a){ const n=parseInt(hex.replace('#',''),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }

function load(){
  try{ const s=JSON.parse(localStorage.getItem(KEY)); if(s&&Array.isArray(s.expenses)) return s; }catch(e){}
  return {defaultIncome:0, incomes:{}, expenses:[], goals:[]};
}
let state=load();
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }

let view=new Date(); view.setDate(1);
let tab='resumo';
let openSec={pagar:true, pago:true};
let fadeNext=false;
let form={};

/* ===================== HELPERS ===================== */
const fmt=new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
const money=v=>fmt.format(v||0);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const monthKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const daysIn=(y,m)=>new Date(y,m,0).getDate();
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function monthLabel(d){ const s=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}); return s.charAt(0).toUpperCase()+s.slice(1); }
const MABBR=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
function nbDate(iso){ if(!iso) return ''; const p=iso.split('-'); return `${parseInt(p[2],10)} ${MABBR[parseInt(p[1],10)-1]}`; }
function pillLabel(d){ let s=d.toLocaleDateString('pt-BR',{month:'long'}); s=s.charAt(0).toUpperCase()+s.slice(1); if(d.getFullYear()!==new Date().getFullYear()) s+=' '+String(d.getFullYear()).slice(2); return s; }
function monthStripHtml(){
  const base=new Date(); base.setDate(1); let out=''; // do mês atual até +3
  for(let i=0;i<=3;i++){
    const d=new Date(base.getFullYear(), base.getMonth()+i, 1);
    out+=`<button class="mpill ${monthKey(d)===monthKey(view)?'on':''}" onclick="app.setMonthTo(${d.getFullYear()},${d.getMonth()})">${pillLabel(d)}</button>`;
  }
  return `<div class="mstrip">${out}</div>`;
}
function monthShort(d){ const s=d.toLocaleDateString('pt-BR',{month:'short',year:'numeric'}); return s.replace('.',''); }
function parseMoney(str){
  if(typeof str==='number') return str;
  if(!str) return 0;
  str=(''+str).replace(/[^\d.,-]/g,'').trim();
  if(str.indexOf(',')>-1){
    str=str.replace(/\./g,'').replace(',','.');            // vírgula = decimal; pontos = milhar
  } else if(/^\d{1,3}(\.\d{3})+$/.test(str)){
    str=str.replace(/\./g,'');                              // pontos de milhar sem decimal (ex.: 4.000 -> 4000)
  }
  const n=parseFloat(str); return isNaN(n)?0:n;
}
function getIncome(k){ return (k in state.incomes)? state.incomes[k] : (state.defaultIncome||0); }

function monthItems(k){
  const [y,m]=k.split('-').map(Number);
  const items=[];
  for(const e of state.expenses){
    if(e.type==='monthly'){
      const day=Math.min(e.day||1, daysIn(y,m));
      const amt=(e.amounts && e.amounts[k]!=null) ? e.amounts[k] : e.amount; // valor específico do mês, se houver
      items.push({...e, amount:amt, custom:!!(e.amounts && e.amounts[k]!=null), date:`${k}-${String(day).padStart(2,'0')}`, paid:(e.paidMonths||[]).includes(k)});
    }else if(e.date && e.date.slice(0,7)===k){
      items.push({...e, paid:!!e.paid});
    }
  }
  return items.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
}
function totals(k){
  const items=monthItems(k);
  let total=0, paid=0;
  for(const it of items){ total+=it.amount; if(it.paid) paid+=it.amount; }
  const income=getIncome(k);
  return {items, total, paid, pending:total-paid, income, balance:income-total};
}

/* ===================== ALERTAS DE VENCIMENTO ===================== */
function daysUntil(iso){ const p=iso.split('-'); const d=new Date(+p[0],+p[1]-1,+p[2]); const n=new Date(); n.setHours(0,0,0,0); return Math.round((d-n)/86400000); }
function dueAlerts(){
  const now=new Date(), k=monthKey(now), todayS=todayStr();
  const d3=new Date(now.getFullYear(),now.getMonth(),now.getDate()+3);
  const soonS=`${d3.getFullYear()}-${String(d3.getMonth()+1).padStart(2,'0')}-${String(d3.getDate()).padStart(2,'0')}`;
  const items=monthItems(k).filter(i=>!i.paid);
  return {
    overdue: items.filter(i=>i.date<todayS),
    today:   items.filter(i=>i.date===todayS),
    soon:    items.filter(i=>i.date>todayS && i.date<=soonS),
    all:     items
  };
}
function alertRow(it,kind){
  const dd=daysUntil(it.date); const c=catOf(it.category);
  let txt,cls;
  if(kind==='atrasado'){ const n=Math.abs(dd); txt=`Venceu há ${n} ${n===1?'dia':'dias'}`; cls='red'; }
  else if(kind==='hoje'){ txt='Vence hoje'; cls='yellow'; }
  else { txt=`Vence em ${dd} ${dd===1?'dia':'dias'}`; cls='orange'; }
  return `<div class="arow" onclick="app.go('gastos')">
    <div class="amid"><div class="aname">${c.emoji} ${esc(it.name)}</div><div class="astatus ${cls}">${txt}</div></div>
    <div class="aval">${money(it.amount)}</div>
  </div>`;
}
function alertsHtml(){
  if(monthKey(view)!==monthKey(new Date())) return '';
  const a=dueAlerts(), rows=[];
  a.overdue.forEach(i=>rows.push(alertRow(i,'atrasado')));
  a.today.forEach(i=>rows.push(alertRow(i,'hoje')));
  a.soon.forEach(i=>rows.push(alertRow(i,'breve')));
  if(!rows.length) return '';
  return `<div class="card">
    <div class="bd-head"><span>🔔 Vencimentos</span></div>
    <div class="alist">${rows.join('')}</div>
    <button class="cal-btn" onclick="app.calendarReminders()">📅 Lembrar no Calendário do iPhone</button>
  </div>`;
}
function icsEsc(s){ return (''+s).replace(/([,;\\])/g,'\\$1').replace(/\n/g,'\\n'); }
function buildICS(bills){
  const L=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//MeuBolso//PT-BR//','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  bills.forEach(b=>{
    const dt=b.date.replace(/-/g,'');
    L.push('BEGIN:VEVENT');
    L.push('UID:meubolso-'+b.id+'-'+b.date+'@meubolso.app');
    L.push('DTSTAMP:'+dt+'T090000');
    L.push('DTSTART:'+dt+'T090000');
    L.push('DTEND:'+dt+'T093000');
    if(b.type==='monthly') L.push('RRULE:FREQ=MONTHLY');
    L.push('SUMMARY:'+icsEsc('💰 '+b.name+' — '+money(b.amount)));
    L.push('DESCRIPTION:'+icsEsc('Conta a pagar • MeuBolso'));
    L.push('BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:'+icsEsc(b.name+' vence hoje'),'TRIGGER:PT0S','END:VALARM');
    L.push('BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:'+icsEsc(b.name+' vence amanhã'),'TRIGGER:-P1D','END:VALARM');
    L.push('END:VEVENT');
  });
  L.push('END:VCALENDAR');
  return L.join('\r\n');
}

/* ===================== BOLETO (linha digitável) ===================== */
function boletoParse(str){
  const d=(str||'').replace(/\D/g,'');
  const pad=n=>String(n).padStart(2,'0');
  const inRange=dt=>{ const t=dt.getTime(), now=Date.now(); return t>now-45*864e5 && t<now+400*864e5; };
  const dateFromFator=f=>{
    if(!f) return null;
    const base=new Date(1997,9,7).getTime();
    let dt=new Date(base+f*864e5);
    if(!inRange(dt)) dt=new Date(base+(f+9000)*864e5); // ajuste do "reset" de fator pós-2025
    return inRange(dt) ? `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}` : null;
  };
  if(d.length===47){
    const c5=d.substr(33,14);
    const valor=parseInt(c5.substr(4,10),10)/100;
    return {ok:true, valor:isFinite(valor)?valor:0, venc:dateFromFator(parseInt(c5.substr(0,4),10))};
  }
  if(d.length===48){
    const bc=d.substr(0,11)+d.substr(12,11)+d.substr(24,11)+d.substr(36,11);
    const valor=parseInt(bc.substr(4,11),10)/100;
    return {ok:true, valor:isFinite(valor)?valor:0, venc:null};
  }
  return {ok:false};
}

const $=id=>document.getElementById(id);
function render(){
  document.querySelectorAll('#tabbar button').forEach(b=>b.classList.toggle('on', b.dataset.tab===tab));
  renderTop();
  if(tab==='resumo') renderResumo();
  else if(tab==='gastos') renderGastos();
  else renderMetas();
  afterRender();
}
function afterRender(){
  if(fadeNext){ const s=$('screen'); s.style.animation='none'; void s.offsetWidth; s.style.animation='fadein .28s ease'; fadeNext=false; }
}
function renderTop(){
  const title = tab==='resumo'?'Resumo': tab==='gastos'?'Gastos':'Metas';
  let action='';
  if(tab==='resumo') action=`<button class="hbtn" onclick="app.editIncome()">Renda</button>`;
  else if(tab==='gastos') action=`<button class="hbtn plus" onclick="app.addExpense()">+</button>`;
  else action=`<button class="hbtn plus" onclick="app.addGoal()">+</button>`;
  const strip = tab!=='metas' ? monthStripHtml() : '';
  $('topbar').innerHTML=`<div class="lt-row"><h1>${title}</h1>${action}</div>${strip}`;
}

function nrowHtml(it,k,today){
  const c=catOf(it.category);
  let style, icon, sub, subCls='';
  if(it.paid){ style=`background:${hexA('#34C759',.16)};color:var(--green);font-weight:800`; icon='✓'; sub=`${nbDate(it.date)} • Pago`; }
  else{
    style=`background:${hexA(c.color,.18)}`; icon=c.emoji;
    if(it.date<today){ sub=`${nbDate(it.date)} • Atrasado`; subCls=' late'; }
    else { sub=`${nbDate(it.date)} • A pagar`; }
  }
  const rec = it.type==='monthly' ? (it.custom ? ' • fixo ✏️' : ' • fixo') : '';
  return `<div class="nrow" onclick="app.editExpense('${it.id}')">
    <button class="nic" style="${style}" onclick="event.stopPropagation();app.togglePaid('${it.id}','${k}')">${icon}</button>
    <div class="nrow-mid">
      <div class="nrow-name">${esc(it.name)}</div>
      <div class="nrow-sub${subCls}">${sub}${rec}</div>
    </div>
    <div class="nrow-val${it.paid?' paid':''}">${money(it.amount)}</div>
  </div>`;
}

function ring(pct, color, size){
  const sw=8, r=(size-sw)/2, c=2*Math.PI*r, off=c*(1-Math.max(0,Math.min(100,pct))/100);
  return `<svg class="ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--fill)" stroke-width="${sw}"/>
    <circle class="arc" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="50%" text-anchor="middle" dy=".35em" font-size="${(size*0.26).toFixed(0)}" font-weight="800" fill="var(--text)">${pct}%</text>
  </svg>`;
}

function breakdownHtml(items){
  const map={};
  for(const it of items){ map[it.category]=(map[it.category]||0)+it.amount; }
  let arr=Object.keys(map).map(id=>({cat:catOf(id), val:map[id]})).sort((a,b)=>b.val-a.val);
  const total=arr.reduce((s,a)=>s+a.val,0);
  if(total<=0) return '';
  const top=arr.slice(0,5);
  const rest=arr.slice(5);
  if(rest.length){ top.push({cat:{name:'Outros',emoji:'📦',color:'#9AA0A6'}, val:rest.reduce((s,a)=>s+a.val,0)}); }
  const seg=top.map(a=>`<i style="width:${(a.val/total*100).toFixed(2)}%;background:${a.cat.color}"></i>`).join('');
  const legend=top.map(a=>`<div class="bd-row">
      <span class="bd-dot" style="background:${a.cat.color}"></span>
      <span class="bd-name">${a.cat.emoji} ${a.cat.name}</span>
      <span class="bd-val">${money(a.val)}</span>
      <span class="bd-pct">${Math.round(a.val/total*100)}%</span>
    </div>`).join('');
  return `<div class="card">
    <div class="bd-head"><span>Pra onde vai o dinheiro</span><span class="mut">${view.toLocaleDateString('pt-BR',{month:'long'})}</span></div>
    <div class="bd-bar">${seg}</div>
    <div class="bd-legend">${legend}</div>
  </div>`;
}

function renderGastos(){
  const k=monthKey(view), t=totals(k), today=todayStr();
  if(!t.items.length){
    $('screen').innerHTML=`<div class="empty"><span class="em">🧾</span>Nenhum gasto em ${monthLabel(view)}.<br>Toque em <b>+</b> pra adicionar.</div>`;
    return;
  }
  const pend=t.items.filter(i=>!i.paid);
  const paid=t.items.filter(i=>i.paid);
  const sum=arr=>arr.reduce((s,i)=>s+i.amount,0);
  const section=(key,title,items)=>{
    if(!items.length) return '';
    const open=openSec[key];
    return `<div class="nsec">
      <div class="nsec-head" onclick="app.toggleSec('${key}')">
        <div><div class="nsec-title">${title}</div>
        <div class="nsec-sub">${items.length} ${items.length===1?'conta':'contas'} • ${money(sum(items))}</div></div>
        <span class="chev ${open?'':'closed'}">⌄</span>
      </div>
      <div class="collapse ${open?'':'closed'}"><div class="cwrap">${items.map(it=>nrowHtml(it,k,today)).join('')}</div></div>
    </div>`;
  };
  $('screen').innerHTML =
    section('pagar','A pagar', pend) +
    section('pago','Deu certo', paid) +
    `<div class="ver" style="margin-top:20px">Total do mês: <b>${money(t.total)}</b> · ${t.items.length} ${t.items.length===1?'item':'itens'}</div>`;
}

function renderMetas(){
  const now=new Date();
  const k=monthKey(now), t=totals(k);
  const cap=t.balance;
  if(!state.goals.length){
    $('screen').innerHTML=`<div class="empty"><span class="em">🎯</span>Nenhuma meta ainda.<br>Ex.: "MacBook R$ 5.000".<br>Toque em + pra criar.</div>`;
    return;
  }
  const capLine = cap>0
    ? `💡 Você consegue guardar <b>${money(cap)}/mês</b> — a sobra de ${now.toLocaleDateString('pt-BR',{month:'long'})}.`
    : `⚠️ Este mês não sobra dinheiro pra guardar. Ajuste renda ou gastos em ${now.toLocaleDateString('pt-BR',{month:'long'})}.`;
  const COLORS=['#34C759','#5E5CE6','#FF9F0A','#FF375F','#3AC0E7'];
  const html = state.goals.map((g,i)=>{
    const remaining=Math.max(0,g.target-g.saved);
    const pct=g.target>0?Math.min(100,Math.round(g.saved/g.target*100)):0;
    const color=remaining<=0?'#34C759':COLORS[i%COLORS.length];
    let eta;
    if(remaining<=0){ eta=`🏆 <b>Meta atingida! Parabéns.</b>`; }
    else if(cap>0){
      const months=Math.ceil(remaining/cap);
      const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+months);
      eta=`📅 Faltam <b>${money(remaining)}</b> · ≈ <b>${months} ${months===1?'mês':'meses'}</b> (${monthShort(d)})`;
    }else{
      eta=`📅 Faltam <b>${money(remaining)}</b>`;
    }
    return `<div class="card">
      <div class="goal-top2" onclick="app.editGoal('${g.id}')">
        ${ring(pct, color, 76)}
        <div class="goal-info2">
          <div class="goal-name">${esc(g.name)}</div>
          <div class="goal-target">${money(g.saved)} de ${money(g.target)}</div>
        </div>
      </div>
      <div class="goal-eta2">${eta}</div>
      ${remaining>0?`<button class="goal-btn" onclick="app.addToGoal('${g.id}')">+ Guardar dinheiro</button>`:''}
    </div>`;
  }).join('');
  $('screen').innerHTML=`<div class="card" style="padding:14px 18px"><div style="font-size:14px;line-height:1.5">${capLine}</div></div>${html}`;
}

function esc(s){ return (s==null?'':''+s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function openSheet(html){ $('sheet').innerHTML=html; document.body.classList.add('sheet-open'); }
function closeSheet(){ document.body.classList.remove('sheet-open'); }

/* ===================== APP ACTIONS ===================== */
const app={
  go(t){ tab=t; fadeNext=true; render(); },
  setMonthTo(y,m){ view=new Date(y,m,1); fadeNext=true; render(); },
  toggleSec(key){ openSec[key]=!openSec[key]; render(); },
  editIncome(){
    const k=monthKey(view);
    openSheet(`
      <div class="grab"></div>
      <div class="sheet-head"><button onclick="app.close()">Cancelar</button><h2>Renda</h2><span style="width:60px"></span></div>
      <div class="field"><label>Renda de ${monthLabel(view)}</label>
        <input id="inc-amount" inputmode="decimal" placeholder="R$ 0,00" value="${getIncome(k)?getIncome(k).toFixed(2).replace('.',','):''}"></div>
      <div class="toggle-row"><span>Usar em todos os meses</span><input type="checkbox" id="inc-all" checked></div>
      <p class="hint">Marcado, vira sua renda padrão. Desmarcado, vale só para ${monthLabel(view)}.</p>
      <button class="save-btn" onclick="app.saveIncome()">Salvar</button>
    `);
  },
  saveIncome(){
    const k=monthKey(view);
    const v=parseMoney($('inc-amount').value);
    state.incomes[k]=v;
    if($('inc-all').checked) state.defaultIncome=v;
    save(); closeSheet(); render();
  },
  addExpense(){ this.expenseSheet(null); },
  editExpense(id){ this.expenseSheet(state.expenses.find(e=>e.id===id)); },
  expenseSheet(e){
    const editing=!!e;
    form.cat = e? e.category : 'contas';
    form.type = e? e.type : 'once';
    form.editing = editing;
    const mk = monthKey(view);
    const chips=CATS.map(c=>`<button class="chip ${form.cat===c.id?'on':''}" data-cat="${c.id}" onclick="app.pickCat('${c.id}')">${c.emoji} ${c.name}</button>`).join('');
    const curAmt = e ? ((e.type==='monthly' && e.amounts && e.amounts[mk]!=null) ? e.amounts[mk] : e.amount) : 0;
    const val = e? curAmt.toFixed(2).replace('.',',') : '';
    const dateVal = e&&e.type!=='monthly'? e.date : monthKey(view)+'-'+String(Math.min(new Date().getDate(),28)).padStart(2,'0');
    const dayVal = e&&e.type==='monthly'? e.day : 5;
    const isPaid = editing && (e.type==='monthly' ? (e.paidMonths||[]).includes(monthKey(view)) : !!e.paid);
    const payBtn = editing ? (isPaid
      ? `<button class="pay-btn undo" onclick="app.togglePaidClose('${e.id}')">↩ Marcar como NÃO pago</button>`
      : `<button class="pay-btn" onclick="app.togglePaidClose('${e.id}')">✓ Marcar como pago</button>`) : '';
    openSheet(`
      <div class="grab"></div>
      <div class="sheet-head"><button onclick="app.close()">Cancelar</button><h2>${editing?'Editar gasto':'Novo gasto'}</h2><span style="width:60px"></span></div>
      ${payBtn}
      ${editing ? '' : `<div class="field"><label>📋 Colar código do boleto</label>
        <input id="exp-boleto" inputmode="numeric" placeholder="Cole aqui os números do boleto" oninput="app.parseBoleto()">
        <p class="hint">Cole a linha digitável (~47 números) que eu preencho o valor e o vencimento. Sempre confira. 👍</p></div>`}
      <div class="field"><label>Descrição</label><input id="exp-name" placeholder="Ex.: Aluguel, Netflix..." value="${e?esc(e.name):''}"></div>
      <div class="field"><label>Valor</label><input id="exp-amount" inputmode="decimal" placeholder="R$ 0,00" value="${val}"></div>
      <div class="field"><label>Categoria</label><div class="chips" id="catchips">${chips}</div></div>
      <div class="field"><label>Tipo</label>
        <div class="seg" id="type-seg">
          <button class="${form.type==='once'?'on':''}" onclick="app.pickType('once')">Único</button>
          <button class="${form.type==='monthly'?'on':''}" onclick="app.pickType('monthly')">Fixo mensal</button>
        </div>
        <p class="hint">Único = só neste mês · Fixo mensal = repete todo mês</p>
      </div>
      <div class="field" id="wrap-date" style="${form.type==='monthly'?'display:none':''}"><label>Vencimento</label><input id="exp-date" type="date" value="${dateVal}"></div>
      <div class="field" id="wrap-day" style="${form.type==='monthly'?'':'display:none'}"><label>Dia do vencimento</label><input id="exp-day" type="number" min="1" max="31" value="${dayVal}"></div>
      <div class="field" id="wrap-allmonths" style="${(editing && form.type==='monthly')?'':'display:none'}">
        <div class="toggle-row"><span>Usar este valor em todos os meses</span><input type="checkbox" id="exp-allmonths"></div>
        <p class="hint">Desmarcado, muda o valor <b>só em ${monthLabel(view)}</b> — ideal pra água/luz, que variam.<br>Marcado, vira o valor padrão de todos os meses.</p>
      </div>
      <button class="save-btn" onclick="app.saveExpense('${e?e.id:''}')">${editing?'Salvar':'Adicionar'}</button>
      ${editing?`<button class="del-btn" onclick="app.deleteExpense('${e.id}')">Excluir gasto</button>`:''}
    `);
  },
  parseBoleto(){
    const el=$('exp-boleto'); if(!el) return;
    const digits=el.value.replace(/\D/g,'');
    if(digits.length!==47 && digits.length!==48) return;
    const r=boletoParse(digits);
    if(!r || !r.ok) return;
    if(r.valor>0){ const a=$('exp-amount'); if(a) a.value=r.valor.toFixed(2).replace('.',','); }
    if(r.venc){ this.pickType('once'); const dInp=$('exp-date'); if(dInp) dInp.value=r.venc; }
  },
  pickCat(id){ form.cat=id; document.querySelectorAll('#catchips .chip').forEach(ch=>ch.classList.toggle('on',ch.dataset.cat===id)); },
  pickType(t){
    form.type=t;
    document.querySelectorAll('#type-seg button').forEach((b,i)=>b.classList.toggle('on',(i===0)===(t==='once')));
    $('wrap-date').style.display = t==='monthly'?'none':'';
    $('wrap-day').style.display = t==='monthly'?'':'none';
    const wa=$('wrap-allmonths'); if(wa) wa.style.display = (t==='monthly' && form.editing)?'':'none';
  },
  saveExpense(id){
    const name=$('exp-name').value.trim()||'Gasto';
    const amount=parseMoney($('exp-amount').value);
    if(amount<=0){ $('exp-amount').focus(); return; }
    if(id){
      const e=state.expenses.find(x=>x.id===id);
      const mk=monthKey(view);
      e.name=name; e.category=form.cat; e.type=form.type;
      if(form.type==='monthly'){
        e.day=parseInt($('exp-day').value)||1; if(!e.paidMonths) e.paidMonths=[]; delete e.date;
        const todos = $('exp-allmonths') ? $('exp-allmonths').checked : true;
        if(todos){ e.amount=amount; if(e.amounts) delete e.amounts[mk]; }   // vira o padrão
        else { e.amounts=e.amounts||{}; e.amounts[mk]=amount; }             // só neste mês
      }else{
        e.amount=amount; e.date=$('exp-date').value; delete e.day; delete e.paidMonths; delete e.amounts;
      }
    }else{
      const base={id:uid(), name, amount, category:form.cat, type:form.type};
      if(form.type==='monthly'){ base.day=parseInt($('exp-day').value)||1; base.paidMonths=[]; }
      else { base.date=$('exp-date').value; base.paid=false; }
      state.expenses.push(base);
    }
    save(); closeSheet(); render();
  },
  deleteExpense(id){
    state.expenses=state.expenses.filter(e=>e.id!==id);
    save(); closeSheet(); render();
  },
  togglePaid(id,k){
    const e=state.expenses.find(x=>x.id===id);
    if(!e) return;
    if(e.type==='monthly'){
      e.paidMonths=e.paidMonths||[];
      const i=e.paidMonths.indexOf(k);
      if(i>-1) e.paidMonths.splice(i,1); else e.paidMonths.push(k);
    }else{ e.paid=!e.paid; }
    save(); render();
  },
  togglePaidClose(id){ this.togglePaid(id, monthKey(view)); closeSheet(); },
  addGoal(){ this.goalSheet(null); },
  editGoal(id){ this.goalSheet(state.goals.find(g=>g.id===id)); },
  goalSheet(g){
    const editing=!!g;
    openSheet(`
      <div class="grab"></div>
      <div class="sheet-head"><button onclick="app.close()">Cancelar</button><h2>${editing?'Editar meta':'Nova meta'}</h2><span style="width:60px"></span></div>
      <div class="field"><label>O que você quer?</label><input id="goal-name" placeholder="Ex.: MacBook, viagem..." value="${g?esc(g.name):''}"></div>
      <div class="field"><label>Quanto custa</label><input id="goal-target" inputmode="decimal" placeholder="R$ 0,00" value="${g?g.target.toFixed(2).replace('.',','):''}"></div>
      <div class="field"><label>Quanto já guardei</label><input id="goal-saved" inputmode="decimal" placeholder="R$ 0,00" value="${g?g.saved.toFixed(2).replace('.',','):'0,00'}"></div>
      <p class="hint">O app calcula em quantos meses você chega lá, usando a sobra do mês (renda − gastos).</p>
      <button class="save-btn" onclick="app.saveGoal('${g?g.id:''}')">${editing?'Salvar':'Criar meta'}</button>
      ${editing?`<button class="del-btn" onclick="app.deleteGoal('${g.id}')">Excluir meta</button>`:''}
    `);
  },
  saveGoal(id){
    const name=$('goal-name').value.trim()||'Meta';
    const target=parseMoney($('goal-target').value);
    const saved=parseMoney($('goal-saved').value);
    if(target<=0){ $('goal-target').focus(); return; }
    if(id){ const g=state.goals.find(x=>x.id===id); g.name=name; g.target=target; g.saved=saved; }
    else state.goals.push({id:uid(), name, target, saved});
    save(); closeSheet(); render();
  },
  deleteGoal(id){
    state.goals=state.goals.filter(g=>g.id!==id);
    save(); closeSheet(); render();
  },
  addToGoal(id){
    const g=state.goals.find(x=>x.id===id);
    openSheet(`
      <div class="grab"></div>
      <div class="sheet-head"><button onclick="app.close()">Cancelar</button><h2>Guardar</h2><span style="width:60px"></span></div>
      <div class="field"><label>Adicionar em "${esc(g.name)}"</label><input id="add-amount" inputmode="decimal" placeholder="R$ 0,00"></div>
      <button class="save-btn" onclick="app.confirmAddToGoal('${id}')">Guardar</button>
    `);
    setTimeout(()=>{ const el=$('add-amount'); if(el) el.focus(); },300);
  },
  confirmAddToGoal(id){
    const g=state.goals.find(x=>x.id===id);
    g.saved=Math.min(g.target, g.saved+parseMoney($('add-amount').value));
    save(); closeSheet(); render();
  },
  async calendarReminders(){
    const bills=dueAlerts().all;
    if(!bills.length){ alert('Nenhuma conta pendente pra lembrar. 🎉'); return; }
    const ics=buildICS(bills);
    const fname='meubolso-lembretes.ics';
    try{
      const file=new File([ics],fname,{type:'text/calendar'});
      if(navigator.canShare && navigator.canShare({files:[file]})){ await navigator.share({files:[file], title:'Lembretes MeuBolso'}); return; }
    }catch(e){ if(e && e.name==='AbortError') return; }
    try{
      const blob=new Blob([ics],{type:'text/calendar'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download=fname;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function(){URL.revokeObjectURL(url);},1500);
    }catch(e){ alert('Não consegui gerar os lembretes.'); }
  },
  async exportData(){
    const fname='meubolso-backup-'+todayStr()+'.json';
    const json=JSON.stringify(state,null,2);
    try{
      const file=new File([json],fname,{type:'application/json'});
      if(navigator.canShare && navigator.canShare({files:[file]})){ await navigator.share({files:[file], title:'Backup MeuBolso'}); return; }
    }catch(e){ if(e && e.name==='AbortError') return; }
    try{
      const blob=new Blob([json],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download=fname;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function(){URL.revokeObjectURL(url);},1500);
    }catch(e){ alert('Não consegui gerar o backup neste navegador.'); }
  },
  importData(){
    const inp=document.createElement('input');
    inp.type='file'; inp.accept='.json,application/json';
    inp.onchange=function(){
      const f=inp.files&&inp.files[0]; if(!f) return;
      const r=new FileReader();
      r.onload=function(){
        try{
          const d=JSON.parse(r.result);
          if(!d || !Array.isArray(d.expenses)) throw new Error('bad');
          state={defaultIncome:d.defaultIncome||0, incomes:d.incomes||{}, expenses:d.expenses||[], goals:d.goals||[]};
          save(); render();
        }catch(e){ alert('Arquivo inválido. Escolha um backup do MeuBolso (.json).'); }
      };
      r.readAsText(f);
    };
    inp.click();
  },
  resetAll(){
    state={defaultIncome:0, incomes:{}, expenses:[], goals:[]};
    seedDemo(); render();
  },
  close(){ closeSheet(); }
};

document.querySelectorAll('#tabbar button').forEach(b=>b.addEventListener('click',()=>{ tab=b.dataset.tab; fadeNext=true; render(); }));

if(localStorage.getItem(KEY)===null){ seedDemo(); state=load(); }

render();
</script>
